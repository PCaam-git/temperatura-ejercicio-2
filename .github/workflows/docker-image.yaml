name: Docker Image CICD V1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
env:
# Nombre del cluster EKS y región de AWS
  EKS_CLUSTER_NAME: cluster-temperatura
  AWS_REGION: us-east-1

jobs:

  build:
  
    name: Deployment
    runs-on: ubuntu-latest

    steps:

# Primer paso: checkout del código. Clona el repositorio
    - name: Check out code
      uses: actions/checkout@v2  

# Segundo paso: permite trabajar con Docker Buildx, una herramienta de construcción de imágenes de Docker
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

# Tercer paso: inicia sesión en Docker Hub utilizando las credenciales almacenadas en los secretos del repositorio
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

 # Cuarto paso: permite darle nombre al contenedor, por eso podemos usar el mismo nombre para el backend y frontend, pero con etiquetas diferentes
 # Latest=true es la etiqueta que identifica la versión más reciente de la imagen, y value=latest es una etiqueta personalizada que también indica que esta es la versión más reciente de la imagen.       
    - name: Docker Metadata for Image
      id: docker_meta_backend
      uses: docker/metadata-action@v5
      with:
        images: pcaamano/temperaturas-backend
        flavor: |
          latest=false
        tags: |
          type=raw,value=01

# Quinto paso: permite construir el contenedor y enviarlo a Docker hub. Context es la carpeta donde se encuentra el Dockerfile, en este caso ./backend. 
    - name: Build and Push Backend to Docker Hub
      id: docker_build_backend
      uses: docker/build-push-action@v5
      with:
       context: ./backend
       push: true
       tags: ${{ steps.docker_meta_backend.outputs.tags }}
       labels: ${{ steps.docker_meta_backend.outputs.labels }}
       cache-from: type=gha
       cache-to: type=gha,mode=max
       platforms: linux/amd64

    - name: Docker Metadata for Image
      id: docker_meta_frontend
      uses: docker/metadata-action@v5
      with:
        images: pcaamano/temperaturas-frontend
        flavor: |
          latest=false
        tags: |
          type=raw,value=01

    - name: Build and Push Frontend to Docker Hub
      id: docker_build_frontend
      uses: docker/build-push-action@v5
      with:
       context: ./frontend
       push: true
       tags: ${{ steps.docker_meta_frontend.outputs.tags }}
       labels: ${{ steps.docker_meta_frontend.outputs.labels }}
       cache-from: type=gha
       cache-to: type=gha,mode=max
       platforms: linux/amd64   

# Sexto paso: configurar las credenciales de AWS. Recordar que en Academy hay que actualizar con las credenciales de AWS CLI cada día.      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{env.AWS_REGION}}

# Séptimo paso: actualizar la configuración de kubeconfig para que kubectl pueda comunicarse con el cluster EKS. Esto es necesario para poder desplegar las aplicaciones en el cluster.   
    - name: Update kube config
      run: aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

# Octavo paso: despliegue de las aplicaciones en el cluster utilizando kubectl. Usa los archivos yaml creados con la configuración de service y deployment para el back y el front.
    - name: Deploy to EKS
      run: |
        kubectl apply -f k8s/temperatura-api-deployment.yml
        kubectl apply -f k8s/temperatura-web-deployment.yml